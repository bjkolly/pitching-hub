<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitching Hub — Sign In</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0f1c;--panel:#131b2e;--panel2:#192236;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --orange:#e8870a;--orange2:#f5a030;--text:#ffffff;--text2:#8899bb;
  --text3:#4a5878;--green:#3dd68c;--red:#f04e5e;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',-apple-system,sans-serif;font-size:13px;
  display:flex;align-items:center;justify-content:center;}
/* Background canvas */
#bgc{position:fixed;inset:0;z-index:0;}
/* Card */
.card{
  position:relative;z-index:10;
  width:380px;background:var(--panel);
  border:1px solid var(--border2);border-radius:18px;
  padding:44px 40px 36px;
  box-shadow:0 32px 96px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);
}
/* Logo */
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.logo-mark{font-size:30px;line-height:1;}
.logo-right{display:flex;flex-direction:column;gap:2px;}
.logo-title{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--orange);text-transform:uppercase;}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:1.5px;}
/* Heading */
.hd{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px;}
.sub{font-size:12px;color:var(--text2);margin-bottom:32px;line-height:1.5;}
/* Fields */
.field{margin-bottom:18px;}
label{display:block;font-size:9px;font-weight:600;letter-spacing:2px;
  color:var(--text3);text-transform:uppercase;margin-bottom:7px;}
.inp-wrap{position:relative;}
.inp-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.4;pointer-events:none;}
input{
  width:100%;padding:11px 14px 11px 38px;
  background:var(--panel2);border:1px solid var(--border2);border-radius:9px;
  color:var(--text);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;
}
input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,135,10,.12);}
input::placeholder{color:var(--text3);}
/* Button */
.btn{
  width:100%;padding:13px;margin-top:4px;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  border:none;border-radius:9px;color:#fff;
  font-size:13px;font-weight:700;letter-spacing:.3px;
  cursor:pointer;transition:opacity .15s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover:not(:disabled){opacity:.9;transform:translateY(-1px);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:.45;cursor:default;}
/* Error */
.err{
  display:none;margin-top:16px;padding:10px 14px;
  background:rgba(240,78,94,.09);border:1px solid rgba(240,78,94,.25);
  border-radius:8px;color:var(--red);font-size:11px;text-align:center;
}
.err.show{display:block;}
/* Footer */
.footer{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);
  text-align:center;font-size:10px;color:var(--text3);}
.footer span{color:var(--orange);opacity:.7;}
</style>
</head>
<body>

<canvas id="bgc"></canvas>

<div class="card">
  <div class="logo">
    <div class="logo-mark">⚾</div>
    <div class="logo-right">
      <div class="logo-title">Pitching Hub</div>
      <div class="logo-sub">ANALYTICS PLATFORM</div>
    </div>
  </div>

  <div class="hd">Welcome back</div>
  <p class="sub">Sign in to access your pitching analytics dashboard</p>

  <form id="lf" autocomplete="on">
    <div class="field">
      <label for="un">Username</label>
      <div class="inp-wrap">
        <span class="inp-ico">👤</span>
        <input type="text" id="un" name="username"
               placeholder="Enter username"
               autocomplete="username" required>
      </div>
    </div>
    <div class="field">
      <label for="pw">Password</label>
      <div class="inp-wrap">
        <span class="inp-ico">🔒</span>
        <input type="password" id="pw" name="password"
               placeholder="Enter password"
               autocomplete="current-password" required>
      </div>
    </div>
    <button class="btn" type="submit" id="sb">
      <span id="btn-txt">Sign In</span>
    </button>
    <div class="err" id="er">Invalid username or password. Please try again.</div>
  </form>

  <div class="footer">
    Pitching Hub &nbsp;·&nbsp; Season <span>2025</span> Analytics
  </div>
</div>

<script>
// ── Background (stars + orbit rings) ─────────────────────────────────────────
const cvs = document.getElementById('bgc');
const ctx  = cvs.getContext('2d');
let W, H, stars = [], rings = [];

function resize() {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
  stars = Array.from({ length: 160 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.3 + 0.2, a: Math.random(),
    da: (Math.random() - 0.5) * 0.005,
  }));
  rings = [
    { cx: W * 0.78, cy: H * 0.22, rx: 180, ry: 70, angle: -0.35, op: 0.06 },
    { cx: W * 0.18, cy: H * 0.8,  rx: 120, ry: 50, angle: 0.2,   op: 0.04 },
  ];
}

function frame() {
  ctx.clearRect(0, 0, W, H);
  // Radial BG
  const g = ctx.createRadialGradient(W * 0.42, H * 0.5, 0, W * 0.42, H * 0.5, Math.max(W, H) * 0.85);
  g.addColorStop(0, '#141e38'); g.addColorStop(0.5, '#0d1427'); g.addColorStop(1, '#080c18');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // Orbit rings
  rings.forEach(ring => {
    ctx.save();
    ctx.translate(ring.cx, ring.cy);
    ctx.rotate(ring.angle);
    ctx.scale(1, ring.ry / ring.rx);
    ctx.beginPath();
    ctx.arc(0, 0, ring.rx, 0, Math.PI * 2);
    ctx.restore();
    ctx.strokeStyle = `rgba(232,135,10,${ring.op})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  });
  // Stars
  stars.forEach(s => {
    s.a = Math.max(0.05, Math.min(1, s.a + s.da));
    if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,210,255,${s.a * 0.55})`;
    ctx.fill();
  });
  requestAnimationFrame(frame);
}

window.addEventListener('resize', resize);
resize();
frame();

// ── Login form ────────────────────────────────────────────────────────────────
const form   = document.getElementById('lf');
const btn    = document.getElementById('sb');
const btnTxt = document.getElementById('btn-txt');
const er     = document.getElementById('er');

form.addEventListener('submit', async e => {
  e.preventDefault();
  btn.disabled = true;
  btnTxt.textContent = 'Signing in…';
  er.classList.remove('show');

  try {
    const res = await fetch('/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        username: document.getElementById('un').value.trim(),
        password: document.getElementById('pw').value,
      }),
      credentials: 'include',
    });

    if (res.ok) {
      btnTxt.textContent = '✓ Success';
      window.location.replace('/');
      return;
    }

    const data = await res.json().catch(() => ({}));
    er.textContent = data.error || 'Invalid username or password. Please try again.';
    er.classList.add('show');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  } catch {
    er.textContent = 'Network error — please check your connection.';
    er.classList.add('show');
  }

  btnTxt.textContent = 'Sign In';
  btn.disabled = false;
});

// Auto-focus
document.getElementById('un').focus();
</script>
</body>
</html>
